  Terraform-Apply:
    runs-on: self-hosted
    steps:
      - name: Check out repository code
        uses: actions/checkout@v5
      - name: Terraform init
        run: |
          terraform init -backend-config=env-dev/state.tfvars
          terraform apply -var-file=env-dev/main.tfvars -var vault_token=${vault_token} -auto-approve
        env:
          vault_token: ${{ secrets.vault_token }}


  Helm-Install-Applications:
    runs-on: self-hosted
    steps:
      - name: Check out repository code
        uses: actions/checkout@v5
        with:
          repository: manjudevopszone/roboshop-helm
          Path: helm
      - name: Terraform init
        run: |
          for chart in frontend catalogue user shipping payment cart ; do make env=dev component=$$chart;done
        env:
          vault_token: ${{ secrets.vault_token }}

